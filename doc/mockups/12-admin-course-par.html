<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>ScoreCaddie - 골프장 루프·Par 입력</title><link rel="stylesheet" href="_shared.css">
<style>
  .par-select { width: 56px; margin-bottom: 0; padding: 4px 2px; text-align: center; height: 30px; }

  .loop-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .loop-tab {
    display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px;
  }
  .loop-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
  .loop-tab .del-x {
    font-size: 11px; opacity: 0.6; width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .loop-tab .del-x:hover { opacity: 1; background: rgba(255,255,255,0.25); }
  .loop-tab.active .del-x:hover { background: rgba(255,255,255,0.3); }
  .loop-tab:not(.active) .del-x:hover { background: var(--card-bg2); }

  .add-loop-tab {
    padding: 8px 10px; border-radius: 8px; border: 1px dashed var(--moss); background: var(--white);
    color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600;
  }

  .loop-hint { font-size: 11px; color: var(--text-muted); margin: -8px 0 14px; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>ScoreCaddie</span></div>
  <div class="topbar"><a href="11-admin-courses.html" class="back">‹ 뒤로</a><h1>루프·Par 입력</h1><span></span></div>
  <div class="content">
    <div class="card" style="margin-bottom:14px;">
      <div style="font-weight:700; font-size:15px;">레이크사이드 CC</div>
      <div class="muted">경기도 용인시 · 루프 <span id="loop-count">2</span>개</div>
    </div>

    <h2 class="section-title">루프(코스) 선택</h2>
    <div class="loop-tabs" id="loop-tabs"></div>
    <p class="loop-hint">루프 이름 더블탭으로 변경 · "+ 루프 추가"로 동/서/남코스 등 신설 · ✕로 삭제</p>

    <h2 class="section-title">홀별 Par (규정타수) — <span id="active-loop-name">전반</span></h2>
    <div class="hole-list" id="hole-grid" style="margin-bottom:14px;"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:1px solid var(--border); margin-bottom:14px;">
      <span class="muted">이 루프 합계 Par</span><span style="font-weight:700; font-size:16px;" id="loop-par-total">36</span>
    </div>

    <a href="11-admin-courses.html" class="btn" id="save-btn">저장</a>
  </div>
  <div class="screen-label">12. 관리자 - 골프장 루프·Par 입력/수정 — 루프 UI 반영 (2026-07-16)</div>
</div>
<script>
(function () {
  var loops = [
    { name: '전반', pars: [4,5,3,4,4,3,5,4,4] },
    { name: '후반', pars: [4,4,3,5,4,4,3,5,4] }
  ];
  var current = 0;

  var tabsEl = document.getElementById('loop-tabs');
  var gridEl = document.getElementById('hole-grid');
  var loopCountEl = document.getElementById('loop-count');
  var activeNameEl = document.getElementById('active-loop-name');
  var totalEl = document.getElementById('loop-par-total');

  function renderTabs() {
    tabsEl.innerHTML = '';
    loops.forEach(function (loop, idx) {
      var tab = document.createElement('div');
      tab.className = 'loop-tab' + (idx === current ? ' active' : '');
      var label = document.createElement('span');
      label.textContent = loop.name;
      tab.appendChild(label);

      if (loops.length > 1) {
        var del = document.createElement('span');
        del.className = 'del-x';
        del.textContent = '✕';
        del.addEventListener('click', function (e) {
          e.stopPropagation();
          if (!confirm('"' + loop.name + '" 루프를 삭제할까요? 이 루프를 참조 중인 라운드가 있으면 실제 화면에서는 경고가 표시됩니다.')) return;
          loops.splice(idx, 1);
          if (current >= loops.length) current = loops.length - 1;
          else if (idx < current) current -= 1;
          renderAll();
        });
        tab.appendChild(del);
      }

      tab.addEventListener('click', function () { current = idx; renderAll(); });
      tab.addEventListener('dblclick', function (e) {
        e.stopPropagation();
        var name = prompt('루프 이름 변경', loop.name);
        if (name && name.trim()) { loop.name = name.trim(); renderAll(); }
      });
      tabsEl.appendChild(tab);
    });

    var addTab = document.createElement('div');
    addTab.className = 'add-loop-tab';
    addTab.textContent = '+ 루프 추가';
    addTab.addEventListener('click', function () {
      var name = prompt('새 루프 이름 (예: 남코스)');
      if (name && name.trim()) {
        loops.push({ name: name.trim(), pars: [4,4,3,4,4,3,4,4,3] });
        current = loops.length - 1;
        renderAll();
      }
    });
    tabsEl.appendChild(addTab);

    loopCountEl.textContent = loops.length;
  }

  function renderGrid() {
    var loop = loops[current];
    activeNameEl.textContent = loop.name;
    gridEl.innerHTML = '';
    for (var i = 0; i < 9; i += 2) {
      var row = document.createElement('div');
      row.className = 'hole-row2';
      [i, i + 1].forEach(function (holeIdx) {
        if (holeIdx >= 9) return;
        var block = document.createElement('div');
        block.className = 'hole-block';
        var n = document.createElement('span');
        n.className = 'n';
        n.textContent = (holeIdx + 1) + '홀';
        var sel = document.createElement('select');
        sel.className = 'par-select';
        [3, 4, 5].forEach(function (p) {
          var opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          if (loop.pars[holeIdx] === p) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', function () {
          loop.pars[holeIdx] = parseInt(sel.value, 10);
          updateTotal();
        });
        block.appendChild(n);
        block.appendChild(sel);
        row.appendChild(block);
      });
      gridEl.appendChild(row);
    }
    updateTotal();
  }

  function updateTotal() {
    var loop = loops[current];
    var sum = loop.pars.reduce(function (a, b) { return a + b; }, 0);
    totalEl.textContent = sum;
  }

  function renderAll() {
    renderTabs();
    renderGrid();
  }

  renderAll();
})();
</script>
</body></html>
