<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>ScoreCaddie - 관리자 회원 관리</title><link rel="stylesheet" href="_shared.css">
<style>
  .filter-row { display:flex; gap:8px; margin-bottom:8px; }
  .filter-row input[type=date] { margin-bottom:0; }
  .filter-row .to-sep { align-self:center; color:var(--text-muted); font-size:12px; }

  .admin-only-row { display:flex; align-items:center; gap:6px; margin-bottom:12px; font-size:12.5px; color:var(--text-muted); }
  .admin-only-row input[type=checkbox] { width:14px; height:14px; margin:0; cursor:pointer; }
  .admin-only-row label { margin:0; cursor:pointer; }

  .search-btn-row { display:flex; gap:8px; margin-bottom:14px; }
  .search-btn-row .btn { padding:9px; font-size:12.5px; }
  .search-btn-row .btn.secondary { flex:0 0 70px; }

  .total-count { font-size:12px; color:var(--text-muted); margin-bottom:8px; }

  table.member-grid { width:100%; border-collapse:collapse; }
  table.member-grid th, table.member-grid td {
    border-bottom:1px solid var(--border); text-align:center; font-size:10.5px; padding:8px 2px;
  }
  table.member-grid th {
    background:var(--card-bg2); color:var(--primary); font-size:10px; font-weight:700; position:sticky; top:0;
  }
  table.member-grid col.col-chk { width:24px; }
  table.member-grid col.col-name { width:20%; }
  table.member-grid col.col-email { width:34%; }
  table.member-grid col.col-date { width:22%; }
  table.member-grid col.col-admin { width:16%; }
  table.member-grid td.col-name-cell { text-align:left; font-weight:600; }
  table.member-grid td.col-email-cell { text-align:left; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  table.member-grid td.name-empty { color:var(--text-muted); font-style:italic; font-weight:400; }
  table.member-grid tr.row-selected { background:var(--card-bg); }
  table.member-grid input[type=checkbox], table.member-grid input[type=radio] { width:14px; height:14px; margin:0; cursor:pointer; }
  table.member-grid input[type=checkbox]:disabled { cursor:default; opacity:0.85; }

  .bulk-bar {
    display:none; align-items:center; justify-content:space-between; gap:8px;
    background:var(--card-bg); border-radius:10px; padding:10px 12px; margin-top:12px;
  }
  .bulk-bar.show { display:flex; }
  .bulk-bar .cnt { font-size:12px; font-weight:700; color:var(--primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bulk-bar .actions { display:flex; gap:6px; }
  .bulk-bar button {
    border:1px solid var(--primary); background:#fff; color:var(--primary); font-size:11px; font-weight:700;
    padding:7px 9px; border-radius:8px; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .bulk-bar button.danger { border-color:#C1552F; color:#C1552F; }

  .empty-state { text-align:center; color:var(--text-muted); font-size:12.5px; padding:30px 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span>ScoreCaddie</span></div>
  <div class="topbar"><a href="04-dashboard.html" class="back">‹ 뒤로</a><h1>회원 관리</h1><span></span></div>
  <div class="content">
    <span class="badge" style="background:var(--accent); color:#fff; margin-bottom:10px; display:inline-block;">관리자 전용</span>

    <label>이름</label>
    <input type="text" id="filter-name" placeholder="이름으로 검색">

    <label>가입 일자</label>
    <div class="filter-row">
      <input type="date" id="filter-from">
      <span class="to-sep">~</span>
      <input type="date" id="filter-to">
    </div>

    <div class="admin-only-row">
      <input type="checkbox" id="filter-admin-only">
      <label for="filter-admin-only">관리자만 보기</label>
    </div>

    <div class="search-btn-row">
      <button type="button" class="btn" id="search-btn">검색</button>
      <button type="button" class="btn secondary" id="reset-btn">초기화</button>
    </div>

    <div class="total-count" id="total-count">전체 8명</div>

    <table class="member-grid">
      <colgroup>
        <col class="col-chk"><col class="col-name"><col class="col-email"><col class="col-date"><col class="col-admin">
      </colgroup>
      <thead>
        <tr>
          <th></th>
          <th>이름</th>
          <th>이메일</th>
          <th>가입일</th>
          <th>어드민</th>
        </tr>
      </thead>
      <tbody id="member-tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">검색 조건에 맞는 회원이 없습니다</div>

    <div class="bulk-bar" id="bulk-bar">
      <span class="cnt" id="bulk-count"></span>
      <div class="actions" id="bulk-actions"></div>
    </div>
  </div>
  <div class="screen-label">14. 관리자 - 회원 관리 — 단일 선택 + 역할별 버튼 + 관리자만 보기 (2026-07-21)</div>
</div>
<script>
(function () {
  // 회원 mock 데이터. 실제 구현 시 GET /api/admin/users?name=&from=&to=&adminOnly= 응답으로 대체.
  // name은 User.name(nullable) 그대로 반영 — 소셜 로그인 초기 상태 등 이름 미입력 계정 예시 포함.
  var ALL_MEMBERS = [
    { id: 'u1', name: '김재홍', email: 'jaehong@example.com', createdAt: '2026-05-02', role: 'ADMIN' },
    { id: 'u2', name: '이서연', email: 'seoyeon@example.com', createdAt: '2026-05-10', role: 'USER' },
    { id: 'u3', name: '박도윤', email: 'doyun@example.com', createdAt: '2026-05-22', role: 'USER' },
    { id: 'u4', name: null, email: 'social1234@example.com', createdAt: '2026-06-01', role: 'USER' },
    { id: 'u5', name: '최민준', email: 'minjun@example.com', createdAt: '2026-06-15', role: 'USER' },
    { id: 'u6', name: '정하은', email: 'haeun@example.com', createdAt: '2026-06-28', role: 'USER' },
    { id: 'u7', name: '강태현', email: 'taehyun@example.com', createdAt: '2026-07-05', role: 'ADMIN' },
    { id: 'u8', name: '윤서아', email: 'seoah@example.com', createdAt: '2026-07-14', role: 'USER' }
  ];

  // 2026-07-21: 다중 선택 → 단일 선택으로 변경(한 번에 한 명씩만 권한 변경). selectedId는
  // 최대 1개의 id만 담는다(없으면 null).
  var selectedId = null;
  var currentList = ALL_MEMBERS.slice();

  var tbody = document.getElementById('member-tbody');
  var emptyState = document.getElementById('empty-state');
  var totalCount = document.getElementById('total-count');
  var bulkBar = document.getElementById('bulk-bar');
  var bulkCount = document.getElementById('bulk-count');
  var bulkActions = document.getElementById('bulk-actions');

  function findMember(id) {
    return ALL_MEMBERS.filter(function (m) { return m.id === id; })[0] || null;
  }

  function renderRows() {
    if (!currentList.length) {
      tbody.innerHTML = '';
      emptyState.style.display = '';
      totalCount.textContent = '전체 0명';
      updateActionBar();
      return;
    }
    emptyState.style.display = 'none';
    totalCount.textContent = '전체 ' + currentList.length + '명';

    tbody.innerHTML = currentList.map(function (m) {
      var nameCell = m.name
        ? m.name
        : '<span class="name-empty">이름 없음</span>';
      var checked = selectedId === m.id ? ' checked' : '';
      var rowClass = selectedId === m.id ? ' class="row-selected"' : '';
      var adminChecked = m.role === 'ADMIN' ? ' checked' : '';
      return (
        '<tr' + rowClass + ' data-id="' + m.id + '">' +
          '<td><input type="radio" name="member-radio" class="row-radio" data-id="' + m.id + '"' + checked + '></td>' +
          '<td class="col-name-cell">' + nameCell + '</td>' +
          '<td class="col-email-cell">' + m.email + '</td>' +
          '<td>' + m.createdAt + '</td>' +
          '<td><input type="checkbox" class="admin-checkbox" disabled' + adminChecked + '></td>' +
        '</tr>'
      );
    }).join('');

    tbody.querySelectorAll('.row-radio').forEach(function (radio) {
      radio.addEventListener('change', function () {
        selectedId = radio.checked ? radio.dataset.id : null;
        tbody.querySelectorAll('tr').forEach(function (tr) {
          tr.classList.toggle('row-selected', tr.getAttribute('data-id') === selectedId);
        });
        updateActionBar();
      });
    });
  }

  // 선택된 회원의 현재 role에 따라 버튼을 하나만 노출한다 — USER면 "어드민 권한 부여"만,
  // ADMIN이면 "어드민 권한 해제"만. (기존엔 두 버튼이 항상 같이 떠서 잘못 누를 여지가 있었음)
  function updateActionBar() {
    var member = selectedId ? findMember(selectedId) : null;
    if (!member) {
      bulkBar.classList.remove('show');
      bulkActions.innerHTML = '';
      bulkCount.textContent = '';
      return;
    }

    var displayName = member.name || '이름 없음';
    bulkCount.textContent = displayName + ' 선택됨';

    if (member.role === 'ADMIN') {
      bulkActions.innerHTML = '<button type="button" class="danger" id="revoke-admin-btn">어드민 권한 해제</button>';
    } else {
      bulkActions.innerHTML = '<button type="button" id="grant-admin-btn">어드민 권한 부여</button>';
    }
    bulkBar.classList.add('show');

    var grantBtn = document.getElementById('grant-admin-btn');
    if (grantBtn) grantBtn.addEventListener('click', function () { setRole(member.id, 'ADMIN'); });
    var revokeBtn = document.getElementById('revoke-admin-btn');
    if (revokeBtn) revokeBtn.addEventListener('click', function () { setRole(member.id, 'USER'); });
  }

  function applyFilter() {
    var nameQ = document.getElementById('filter-name').value.trim();
    var from = document.getElementById('filter-from').value;
    var to = document.getElementById('filter-to').value;
    var adminOnly = document.getElementById('filter-admin-only').checked;

    currentList = ALL_MEMBERS.filter(function (m) {
      if (nameQ && (!m.name || m.name.indexOf(nameQ) === -1)) { return false; }
      if (from && m.createdAt < from) { return false; }
      if (to && m.createdAt > to) { return false; }
      if (adminOnly && m.role !== 'ADMIN') { return false; }
      return true;
    });
    renderRows();
  }

  document.getElementById('search-btn').addEventListener('click', applyFilter);
  document.getElementById('reset-btn').addEventListener('click', function () {
    document.getElementById('filter-name').value = '';
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    document.getElementById('filter-admin-only').checked = false;
    currentList = ALL_MEMBERS.slice();
    selectedId = null;
    renderRows();
    updateActionBar();
  });

  // 어드민 권한 부여/해제 — 선택된 1명의 role만 변경 후 "어드민" 컬럼 체크박스에 즉시 반영.
  function setRole(id, role) {
    var member = findMember(id);
    if (member) { member.role = role; }
    selectedId = null;
    renderRows();
    updateActionBar();
  }

  renderRows();
  updateActionBar();
})();
</script>
</body></html>
