# ScoreCaddie 로컬 개발용 PostgreSQL
# 실행:   cd db && docker compose up -d
# 종료:   docker compose down          (데이터는 volume에 남아있어 다시 up 하면 유지됨)
# 완전삭제: docker compose down -v     (볼륨까지 삭제, 데이터 초기화)

services:
  postgres:
    image: postgres:16-alpine
    container_name: scorecaddie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scorecaddie
      POSTGRES_PASSWORD: scorecaddie_local_pw
      POSTGRES_DB: scorecaddie
    ports:
      - "5432:5432"
    volumes:
      - scorecaddie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorecaddie -d scorecaddie"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 선택사항: DB를 GUI로 보고 싶을 때 사용 (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scorecaddie-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scorecaddie.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools   # 기본 up 에는 포함 안 됨. 필요시: docker compose --profile tools up -d

volumes:
  scorecaddie_pgdata:
    name: scorecaddie_pgdata
